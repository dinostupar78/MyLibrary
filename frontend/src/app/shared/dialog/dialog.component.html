<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button *ngIf="data.type === 'confirm'" (click)="close(false)">
    Cancel
  </button>

  <button
    mat-raised-button
    color="primary"
    (click)="close(true)">
    OK
  </button>
</mat-dialog-actions>
