<div class="google-page">

  <div class="google-container">

    <h2 class="google-title">Google Books Import</h2>

    <div class="google-search-bar">
      <input
        type="text"
        [(ngModel)]="query"
        class="form-control"
        placeholder="Search books..."
      />
      <button class="btn btn-primary search-btn" (click)="search()">
        Search
      </button>
    </div>

    <div *ngIf="loading" class="loading-wrapper">
      <div class="spinner-border text-primary"></div>
    </div>

    <div *ngFor="let book of results; let i = index" class="google-card">

      <div class="google-card-content">

        <div class="google-image-wrapper">
          <img
            [src]="book.image_url"
            class="google-image"
            alt=""
          />
        </div>

        <div class="google-info">
          <h5 class="google-book-title">{{ book.title }}</h5>
          <p class="google-author">
            {{ book.authors?.join(', ') }}
          </p>
          <small class="google-category">
            {{ book.categories?.[0] }}
          </small>
        </div>

        <div class="google-actions">
          <button
            class="btn btn-success action-btn"
            (click)="import(book, i)">
            Import
          </button>

          <button
            class="btn btn-outline-secondary action-btn"
            (click)="removeBook(i)">
            Close
          </button>
        </div>

      </div>

    </div>

  </div>

</div>
