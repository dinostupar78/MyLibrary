<div class="modal-backdrop-custom">
  <div class="modal-box">

    <h5 class="mb-3">Borrow Book</h5>

    <div class="mb-3">
      <label class="form-label">Book</label>
      <input
        type="text"
        class="form-control"
        [value]="book?.title"
        disabled
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Return date</label>
      <input
        type="date"
        class="form-control"
        [(ngModel)]="returnDate"
      />
    </div>

    <div class="d-flex justify-content-end gap-2">
      <button class="btn btn-secondary"
              (click)="close.emit()">
        Cancel
      </button>

      <button class="btn btn-primary"
              (click)="borrow()">
        Confirm
      </button>
    </div>

  </div>
</div>
