<div class="container mt-4 profile-container" *ngIf="user as u">

  <h3 class="profile-section-title text-center">User details</h3>

  <!-- AVATAR -->
  <div class="avatar-wrapper avatar-wrapper-large">
    <img
      class="avatar large"
      [src]="API_URL + user.user_image_url"
      alt="avatar"
    />

  </div>

  <div class="mt-2">
    <input
      type="file"
      accept="image/*"
      (change)="onAvatarSelected($event)"
    />
  </div>

  <div class="profile-details-wrapper">

    <h3 class="profile-details-title">User data</h3>

    <div class="profile-card profile-details-card">

      <div class="profile-row">
        <span class="profile-label">Username</span>
        <span class="profile-value">{{ u.username }}</span>
      </div>

      <div class="profile-row">
        <span class="profile-label">Email</span>
        <span class="profile-value">{{ u.email }}</span>
      </div>

      <div class="profile-row">
        <span class="profile-label">Name</span>
        <span class="profile-value">{{ u.name }}</span>
      </div>

    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="saveProfile()">

    <div class="profile-row">
      <span class="profile-label">Name</span>
      <input formControlName="name" />
    </div>

    <div class="profile-row">
      <span class="profile-label">Email</span>
      <input formControlName="email" />
    </div>

    <button type="submit">Save</button>

  </form>


</div>
