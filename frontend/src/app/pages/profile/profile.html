<div class="container profile-container" *ngIf="user as u">

  <h3 class="profile-section-title">User profile</h3>

  <form *ngIf="form" [formGroup]="form" class="profile-card">

    <div class="profile-header">
      <div class="avatar-wrapper avatar-wrapper-large">
        <img
          class="avatar large"
          [src]="avatarPreview || (API_URL + u.user_image_url)"
          alt="avatar"
        />
      </div>

      <h3 class="profile-name">{{ u.name }}</h3>
      <p class="profile-username">{{ u.username }}</p>
      <p class="profile-email">{{ u.email }}</p>

      <div class="avatar-actions mt-2">

        <input
          #fileInput
          type="file"
          accept="image/*"
          hidden
          (change)="onAvatarSelected($event)"
        />

        <button
          type="button"
          class="btn btn-outline-primary btn-sm"
          (click)="fileInput.click()">
          Choose file
        </button>

        <span class="ms-2 text-muted" *ngIf="!avatarFile">No file chosen</span>

        <span class="ms-2 fw-medium" *ngIf="avatarFile">{{ avatarFile.name }}</span>

        <div *ngIf="avatarFile" class="d-flex gap-2 mt-2">
          <button
            type="button"
            class="btn btn-success btn-sm"
            (click)="confirmAvatar()">
            Save
          </button>

          <button
            type="button"
            class="btn btn-outline-secondary btn-sm"
            (click)="cancelAvatar()">
            Cancel
          </button>
        </div>

      </div>
    </div>

    <hr/>

    <div class="profile-row">
      <span class="profile-label">Username</span>
      <span class="profile-value">{{ u.username }}</span>
    </div>

    <div class="profile-row">
      <span class="profile-label">Email</span>

      <span *ngIf="editingField !== 'email'" class="profile-value">
        {{ u.email }}
      </span>

      <input *ngIf="editingField === 'email'" formControlName="email" />

      <button
        type="button"
        *ngIf="editingField !== 'email'"
        class="btn btn-outline-primary btn-sm ms-3"
        (click)="startEdit('email')">
        Change
      </button>

      <div *ngIf="editingField === 'email'" class="edit-actions">
        <button type="button" class="btn btn-success btn-sm" (click)="saveProfile()">Save</button>
        <button type="button" class="btn btn-outline-secondary btn-sm" (click)="cancelEdit()">Cancel</button>
      </div>
    </div>

    <div class="profile-row">
      <span class="profile-label">Name</span>

      <span *ngIf="editingField !== 'name'" class="profile-value">
        {{ u.name }}
      </span>

      <input *ngIf="editingField === 'name'" formControlName="name" />

      <button
        type="button"
        *ngIf="editingField !== 'name'"
        class="btn btn-outline-primary btn-sm ms-3"
        (click)="startEdit('name')">
        Change
      </button>

      <div *ngIf="editingField === 'name'" class="edit-actions">
        <button type="button" class="btn btn-success btn-sm" (click)="saveProfile()">Save</button>
        <button type="button" class="btn btn-outline-secondary btn-sm" (click)="cancelEdit()">Cancel</button>
      </div>
    </div>

  </form>
</div>
