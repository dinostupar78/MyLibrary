<div class="container loans-page mt-5">

  <h1 class="page-title mb-4">My Loans</h1>

  <div *ngIf="loans.length === 0" class="empty-state">
    You currently have no borrowed books.
  </div>

  <div class="row g-4">

    <div class="col-12 col-md-6 col-lg-4" *ngFor="let loan of loans">

      <div class="loan-card">

        <h5 class="book-title">
          {{ loan.title }}
        </h5>

        <div class="loan-info">
          <p>
            <span>Borrowed:</span>
            {{ loan.borrow_date | date:'dd.MM.yyyy' }}
          </p>

          <p>
            <span>Return until:</span>
            {{ loan.return_date | date:'dd.MM.yyyy' }}
          </p>
        </div>

        <div class="loan-footer">

          <span
            class="status-badge"
            [class.status-borrowed]="loan.status === 'borrowed'"
            [class.status-returned]="loan.status === 'returned'">
            {{ loan.status }}
          </span>

          <button
            *ngIf="loan.status === 'borrowed'"
            class="btn btn-outline-danger btn-sm"
            (click)="returnBook(loan.id)">
            Return
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
