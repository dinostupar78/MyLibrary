<div class="container pt-5 mt-5" *ngIf="!loading && book">

  <div class="row">
    <div class="col-md-4 text-center">
      <img
        [src]="book.image_url ? (API_URL + book.image_url) : 'public/bookPlaceholder.png'"
        class="img-fluid rounded shadow"
        style="max-height: 400px; object-fit: cover;"
        alt="Book cover"
      />
    </div>

    <div class="col-md-8">
      <h2>{{ book.title }}</h2>
      <h5 class="text-muted">{{ book.author }}</h5>

      <p class="mt-3">
        <strong>Genre:</strong> {{ book.genre_name }}
      </p>

      <p>
        <strong>Available copies:</strong>
        <span
          [class.text-success]="book.available_copies > 0"
          [class.text-danger]="book.available_copies === 0">
          {{ book.available_copies }}
        </span>
      </p>

      <p *ngIf="book.published_year">
        <strong>Published:</strong> {{ book.published_year }}
      </p>

      <p *ngIf="book.isbn">
        <strong>ISBN:</strong> {{ book.isbn }}
      </p>

      <hr>

      <p>
        {{ book.description || 'No description available.' }}
      </p>

      <a routerLink="/books" class="btn btn-secondary mt-3">
        Back
      </a>
    </div>
  </div>

</div>

<div *ngIf="loading" class="text-center mt-5">
  Loading...
</div>
