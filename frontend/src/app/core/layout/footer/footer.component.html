<footer class="mylibrary-footer">
  <div class="container">
    <div class="row">
      <div class="col-md-6">
        <h6 id="about">About</h6>
        <p class="text-justify">
          A smarter way to explore books.<br>
          MyLibrary is a digital library built to make borrowing books simple.
        </p>
      </div>

      <div class="col-md-3">
        <h6></h6>
        <ul class="footer-links">
        </ul>
      </div>

      <div class="col-md-3">
        <h6>Quick Links</h6>

        <ul class="footer-links">
          <li>
            <a routerLink="/">Home</a>
          </li>

          <li>
            <a routerLink="/books">Books</a>
          </li>

          <li *ngIf="user?.role === 'admin'">
            <a routerLink="/loans">Loans</a>
          </li>

          <li>
            <a routerLink="/about">About</a>
          </li>

          <li *ngIf="user">
            <a (click)="logout()">Logout</a>
          </li>

          <li *ngIf="!user">
            <a routerLink="/login">Sign In</a>
          </li>
        </ul>
      </div>
    </div>
    <hr>
    <div class="row">
      <div class="col-md-8 col-sm-6">
        <p class="copyright-text">Copyright &copy; {{currentYear}} All Rights Reserved by MyLibrary.</p>
      </div>
    </div>
  </div>
</footer>
